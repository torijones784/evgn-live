              </thead>
              <tbody>
                {[['mtd','MTD'],['qtd','QTD'],['ytd','YTD']].map(([k,label],i) => {
                  const d = fin.revenue[k];
                  const { diff, pct, good } = varInfo(d.actual, d.budget);
                  return (
                    <tr key={k} style={{ background:k===period?'rgba(201,168,76,0.04)':'transparent',borderBottom:'1px solid var(--color-border-subtle)' }}>
                      <td style={{ padding:'10px 10px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:k===period?600:400,color:'var(--color-text-primary)' }}>{label}{k===period?' *':''}</td>
                      <td style={{ padding:'10px 10px',fontFamily:'var(--font-body)',fontSize:12.5,textAlign:'right',fontWeight:500,color:'var(--color-text-primary)' }}>{fmt(d.actual)}</td>
                      <td style={{ padding:'10px 10px',fontFamily:'var(--font-body)',fontSize:12.5,textAlign:'right',color:'var(--color-text-tertiary)' }}>{fmt(d.budget)}</td>
                      <td style={{ padding:'10px 10px',textAlign:'right' }}>
                        <span style={{ fontFamily:'var(--font-body)',fontSize:10.5,fontWeight:600,color:good?'#5a7a58':'#8a4030' }}>{diff>=0?'▲':'▼'} {Math.abs(pct).toFixed(1)}%</span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </>, 0)}

          {/* By channel */}
          {sectionCard(<>
            <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14 }}>
              {cardLabel('Revenue by Channel')}
            </div>
            <PieChartSVG data={pieData}/>
            <div style={{ display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap',marginTop:8 }}>
              {fin.channels.map(c => {
                const total = fin.channels.reduce((s,x)=>s+x.actual,0)||1;
                const pct = (c.actual/total*100).toFixed(1);
                return (
                  <div key={c.name} style={{ fontFamily:'var(--font-body)',fontSize:11,color:'var(--color-text-secondary)',display:'flex',alignItems:'center',gap:4 }}>
                    <span style={{ width:8,height:8,borderRadius:2,background:c.color,display:'inline-block',flexShrink:0 }}/>
                    {c.name} · <strong>{fmt(c.actual)}</strong> ({pct}%)
                  </div>
                );
              })}
            </div>
          </>, 0)}
        </div>

        {/* ── Gross Profit by Category ── */}
        {sectionCard(<>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14 }}>
            {cardLabel('Gross Profit by Product Category')}
            {qbBadge}
          </div>
          <table style={{ width:'100%',borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'rgba(248,244,238,0.6)' }}>
                {['Category','Revenue','COGS','Gross Profit','GM %'].map(h => (
                  <th key={h} style={{ fontFamily:'var(--font-body)',fontSize:9.5,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--color-text-tertiary)',textAlign:h==='Category'?'left':'right',padding:'8px 14px',borderBottom:'1px solid var(--color-border-subtle)' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {fin.categories.map((cat, i) => {
                const gp = cat.revenue - cat.cogs;
                return (
                  <tr key={i} style={{ background:i%2===0?'rgba(248,244,238,0.4)':'transparent',borderBottom:'1px solid var(--color-border-subtle)' }}>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:13 }}>{cat.name}</td>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,textAlign:'right' }}>{fmt(cat.revenue)}</td>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,textAlign:'right',color:'var(--color-text-secondary)' }}>{fmt(cat.cogs)}</td>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:500,textAlign:'right' }}>{fmt(gp)}</td>
                    <td style={{ padding:'10px 14px',textAlign:'right' }}>
                      <span style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:600,color:cat.margin>=50?'#5a7a58':'var(--color-text-tertiary)' }}>{cat.margin.toFixed(1)}%</span>
                    </td>
                  </tr>
                );
              })}
              <tr style={{ borderTop:'2px solid var(--color-border)' }}>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600 }}>Total</td>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,textAlign:'right' }}>{fmt(fin.pl.revenue.actual)}</td>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,textAlign:'right' }}>{fmt(fin.pl.cogs.actual)}</td>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,textAlign:'right' }}>{fmt(fin.pl.grossProfit.actual)}</td>
                <td style={{ padding:'10px 14px',textAlign:'right' }}>
                  <span style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:700,color:'#5a7a58' }}>{fin.pl.grossMargin.actual.toFixed(1)}%</span>
                </td>
              </tr>
            </tbody>
          </table>
        </>, 20)}

        {/* ── OpEx Breakdown ── */}
        {sectionCard(<>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14 }}>
            {cardLabel('Operating Expenses by Category')}
            {qbBadge}
          </div>
          <table style={{ width:'100%',borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'rgba(248,244,238,0.6)' }}>
                {['Category','Actual','Budget','Variance $','Variance %','of OpEx'].map(h => (
                  <th key={h} style={{ fontFamily:'var(--font-body)',fontSize:9.5,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--color-text-tertiary)',textAlign:h==='Category'?'left':'right',padding:'8px 14px',borderBottom:'1px solid var(--color-border-subtle)' }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {fin.opexBreakdown.map((row, i) => {
                const diff = row.actual - row.budget;
                const pct  = row.budget ? (diff/row.budget*100) : 0;
                const good = diff <= 0;
                const ofTotal = fin.pl.opex.actual ? (row.actual/fin.pl.opex.actual*100).toFixed(1) : '—';
                return (
                  <tr key={i} style={{ background:i%2===0?'rgba(248,244,238,0.4)':'transparent',borderBottom:'1px solid var(--color-border-subtle)' }}>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:13 }}>{row.category}</td>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:500,textAlign:'right' }}>{fmt(row.actual)}</td>
                    <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,textAlign:'right',color:'var(--color-text-tertiary)' }}>{fmt(row.budget)}</td>
                    <td style={{ padding:'10px 14px',textAlign:'right' }}>
                      <span style={{ fontFamily:'var(--font-body)',fontSize:12,fontWeight:600,color:good?'#5a7a58':'#8a4030' }}>{diff<=0?'▼':'▲'} {fmt(Math.abs(diff))}</span>
                    </td>
                    <td style={{ padding:'10px 14px',textAlign:'right' }}>
                      <span style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:600,color:good?'#5a7a58':'#8a4030' }}>{Math.abs(pct).toFixed(1)}%</span>
                    </td>
                    <td style={{ padding:'10px 14px',textAlign:'right' }}>
                      <div style={{ display:'flex',alignItems:'center',justifyContent:'flex-end',gap:6 }}>
                        <div style={{ width:60,height:4,background:'rgba(160,149,139,0.2)',borderRadius:2,overflow:'hidden' }}>
                          <div style={{ height:'100%',width:`${ofTotal}%`,background:'var(--color-gold)',borderRadius:2 }}/>
                        </div>
                        <span style={{ fontFamily:'var(--font-body)',fontSize:11,color:'var(--color-text-tertiary)',width:32,textAlign:'right' }}>{ofTotal}%</span>
                      </div>
                    </td>
                  </tr>
                );
              })}
              <tr style={{ borderTop:'2px solid var(--color-border)' }}>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600 }}>Total OpEx</td>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,textAlign:'right' }}>{fmt(fin.pl.opex.actual)}</td>
                <td style={{ padding:'10px 14px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,textAlign:'right',color:'var(--color-text-tertiary)' }}>{fmt(fin.pl.opex.budget)}</td>
                <td colSpan="3"/>
              </tr>
            </tbody>
          </table>
        </>, 20)}

        {/* ── Trend charts ── */}
        {sectionCard(<>
          <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6 }}>
            {cardLabel('Forecast vs Actual — Trend')}
            <span style={{ fontFamily:'var(--font-body)',fontSize:10.5,color:'var(--color-text-tertiary)',fontStyle:'italic',marginTop:-10 }}>Dashed = budget · Solid = actual</span>
          </div>
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:16 }}>
            <div>
              <div style={{ fontFamily:'var(--font-body)',fontSize:10,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--color-text-tertiary)',marginBottom:8 }}>Revenue</div>
              <DualLineChart labels={fin.trend.labels} actual={fin.trend.revenue} budget={fin.trend.revBudget} prefix="$" height={120} actualColor="var(--color-gold)"/>
            </div>
            <div>
              <div style={{ fontFamily:'var(--font-body)',fontSize:10,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--color-text-tertiary)',marginBottom:8 }}>Gross Profit</div>
              <DualLineChart labels={fin.trend.labels} actual={fin.trend.grossProfit} budget={fin.trend.gpBudget} prefix="$" height={120} actualColor="#8B9E89"/>
            </div>
            <div>
              <div style={{ fontFamily:'var(--font-body)',fontSize:10,fontWeight:600,letterSpacing:'0.07em',textTransform:'uppercase',color:'var(--color-text-tertiary)',marginBottom:8 }}>EBITDA</div>
              <DualLineChart labels={fin.trend.labels} actual={fin.trend.ebitda} budget={fin.trend.ebitdaBudget} prefix="$" height={120} actualColor="#4AA8FF"/>
            </div>
          </div>
        </>, 0)}

      </div>

      {showSnapshot && <FinSnapshotPanel client={client} fin={fin} onClose={()=>setShowSnapshot(false)} />}
    </div>
  );
}


/* ── ADMIN ───────────────────────────────────────────────── */

const DATA_SOURCE_PRESETS = ['Shopify','Google Analytics','Facebook Ads','Instagram Ads','Google Ads','TikTok Ads','Klaviyo','Mailchimp'];

function AdminPage({ managedClients, managedStaff, onUpdateClients, onUpdateStaff, user={} }) {
  const [tab, setTab]                 = React.useState('staff');
  const [showAddClient, setShowAddClient] = React.useState(false);
  const [showAddStaff,  setShowAddStaff]  = React.useState(false);
  const [newClientName, setNewClientName]               = React.useState('');
  const [newClientContactName, setNewClientContactName] = React.useState('');
  const [newClientContactEmail, setNewClientContactEmail] = React.useState('');
  const [newClientSources, setNewClientSources]         = React.useState([]);
  const [newStaffName,  setNewStaffName]  = React.useState('');
  const [newStaffEmail, setNewStaffEmail] = React.useState('');
  const [newStaffRole,  setNewStaffRole]  = React.useState('CMO');
  const [newStaffClientIds, setNewStaffClientIds] = React.useState([]);
  const [expandedClientId, setExpandedClientId] = React.useState(null);
  const [expandedStaffId,  setExpandedStaffId]  = React.useState(null);
  const [confirmDelete, setConfirmDelete] = React.useState(null);
  const [resetSent, setResetSent] = React.useState(null);

  const isAdmin = managedStaff.some(s => s.email.toLowerCase() === (user.email||'').toLowerCase() && s.role === 'Admin');

  const STATUS_CFG = {
    active:      { label:'Active',      color:'#5a7a58', bg:'rgba(90,122,88,0.1)'   },
    paused:      { label:'Paused',      color:'#C9A84C', bg:'rgba(201,168,76,0.1)'  },
    deactivated: { label:'Deactivated', color:'#8a7a6a', bg:'rgba(138,122,106,0.1)' },
  };

  function pill(label, color='var(--color-text-tertiary)', bg='rgba(160,149,139,0.1)') {
    return <span style={{ fontFamily:'var(--font-body)',fontSize:10.5,fontWeight:500,color,background:bg,padding:'2px 8px',borderRadius:10,whiteSpace:'nowrap' }}>{label}</span>;
  }
  function statusBadge(status) {
    const c = STATUS_CFG[status] || STATUS_CFG.active;
    return <span style={{ fontFamily:'var(--font-body)',fontSize:10,fontWeight:600,letterSpacing:'0.06em',textTransform:'uppercase',color:c.color,background:c.bg,padding:'3px 8px',borderRadius:10 }}>{c.label}</span>;
  }

  function updateClientStatus(id, status) { onUpdateClients(prev => prev.map(c => c.id===id ? {...c,status} : c)); }

  function toggleClientDataSource(id, src) {
    onUpdateClients(prev => prev.map(c => {
      if (c.id!==id) return c;
      const has = c.dataSources.includes(src);
      return {...c, dataSources: has ? c.dataSources.filter(s=>s!==src) : [...c.dataSources,src]};
    }));
  }

  function toggleAssignment(staffId, clientId) {
    onUpdateStaff(prev => prev.map(s => {
      if (s.id!==staffId) return s;
      const has = s.clientIds.includes(clientId);
      return {...s, clientIds: has ? s.clientIds.filter(x=>x!==clientId) : [...s.clientIds,clientId]};
    }));
    onUpdateClients(prev => prev.map(c => {
      if (c.id!==clientId) return c;
      const has = c.staffIds.includes(staffId);
      return {...c, staffIds: has ? c.staffIds.filter(x=>x!==staffId) : [...c.staffIds,staffId]};
    }));
  }

  function addClient() {
    if (!newClientName.trim()) return;
    const id = Date.now();
    onUpdateClients(prev => [...prev, {id, name:newClientName.trim(), contactName:newClientContactName.trim(), contactEmail:newClientContactEmail.trim(), status:'active', dataSources:newClientSources, staffIds:[]}]);
    setNewClientName(''); setNewClientContactName(''); setNewClientContactEmail(''); setNewClientSources([]); setShowAddClient(false);
  }

  function addStaff() {
    if (!newStaffName.trim() || !newStaffEmail.trim()) return;
    const id = Date.now();
    onUpdateStaff(prev => [...prev, {id, name:newStaffName.trim(), email:newStaffEmail.trim(), role:newStaffRole, clientIds:newStaffClientIds}]);
    onUpdateClients(prev => prev.map(c => newStaffClientIds.includes(c.id) ? {...c, staffIds:[...c.staffIds,id]} : c));
    setNewStaffName(''); setNewStaffEmail(''); setNewStaffRole('Staff'); setNewStaffClientIds([]);
    setShowAddStaff(false);
  }

  function doDelete() {
    if (!confirmDelete) return;
    if (confirmDelete.type === 'client') onUpdateClients(prev => prev.filter(c => c.id!==confirmDelete.id));
    else onUpdateStaff(prev => prev.filter(s => s.id!==confirmDelete.id));
    setConfirmDelete(null);
  }

  const hd = (label) => (
    <div style={{ fontFamily:'var(--font-body)',fontSize:10,fontWeight:600,letterSpacing:'0.1em',textTransform:'uppercase',color:'var(--color-text-tertiary)',marginBottom:12 }}>{label}</div>
  );

  const toggleBtn = (label, active, onClick) => (
    <button onClick={onClick} style={{ fontFamily:'var(--font-body)',fontSize:11,padding:'4px 10px',borderRadius:20,cursor:'pointer',border:active?'1.5px solid var(--color-gold)':'1px solid var(--color-border)',background:active?'rgba(201,168,76,0.1)':'transparent',color:active?'var(--color-brown-deep)':'var(--color-text-tertiary)',transition:'all 130ms' }}>
      {active ? '✓ ' : ''}{label}
    </button>
  );

  /* ─── CLIENTS TAB ─── */
  function ClientsTab() {
    return (
      <>
        <div style={{ display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 }}>
          <span style={{ fontFamily:'var(--font-body)',fontSize:13,color:'var(--color-text-secondary)' }}>{managedClients.length} client{managedClients.length!==1?'s':''}</span>
          {isAdmin && (
            <button onClick={() => setShowAddClient(true)} style={{ fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:600,padding:'9px 18px',background:'var(--color-brown-deep)',color:'var(--color-cream)',border:'none',borderRadius:4,cursor:'pointer',display:'flex',alignItems:'center',gap:6 }}>
              <span style={{fontSize:14}}>+</span> Add Client
            </button>
          )}
        </div>

        <div style={{ display:'flex',flexDirection:'column',gap:10 }}>
          {managedClients.map(client => {
            const isExp = expandedClientId === client.id;
            const assignedStaff = managedStaff.filter(s => s.clientIds.includes(client.id));
            return (
              <div key={client.id} style={{ background:'var(--color-white)',border:'1px solid var(--color-border)',borderRadius:8,overflow:'hidden' }}>
                <div style={{ padding:'16px 20px',display:'grid',gridTemplateColumns:'1fr auto auto auto auto',alignItems:'center',gap:14 }}>
                  {/* Name + status */}
                  <div style={{ display:'flex',alignItems:'center',gap:10 }}>
                    <span style={{ fontFamily:'var(--font-display)',fontSize:16,fontWeight:400,color:'var(--color-text-primary)' }}>{client.name}</span>
                    {statusBadge(client.status)}
                  </div>
                  {/* Data source pills */}
                  <div style={{ display:'flex',gap:4,flexWrap:'wrap',justifyContent:'flex-end',maxWidth:280 }}>
                    {client.dataSources.slice(0,3).map(ds => pill(ds))}
                    {client.dataSources.length > 3 && pill(`+${client.dataSources.length-3}`)}
                    {client.dataSources.length === 0 && <span style={{ fontFamily:'var(--font-body)',fontSize:11,color:'var(--color-text-tertiary)',fontStyle:'italic' }}>No sources</span>}
                  </div>
                  {/* Staff count */}
                  <span style={{ fontFamily:'var(--font-body)',fontSize:11.5,color:'var(--color-text-tertiary)',whiteSpace:'nowrap' }}>{assignedStaff.length} staff</span>
                  {/* Action buttons */}
                  <div style={{ display:'flex',gap:6 }}>
                    {client.status==='active'      && <button onClick={()=>updateClientStatus(client.id,'paused')}      style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:500,padding:'5px 10px',background:'rgba(201,168,76,0.1)',color:'#C9A84C',border:'1px solid rgba(201,168,76,0.3)',borderRadius:3,cursor:'pointer' }}>Pause</button>}
                    {client.status==='paused'      && <button onClick={()=>updateClientStatus(client.id,'active')}      style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:500,padding:'5px 10px',background:'rgba(90,122,88,0.1)',color:'#5a7a58',border:'1px solid rgba(90,122,88,0.3)',borderRadius:3,cursor:'pointer' }}>Resume</button>}
                    {client.status!=='deactivated' && <button onClick={()=>updateClientStatus(client.id,'deactivated')} style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:500,padding:'5px 10px',background:'rgba(138,122,106,0.08)',color:'var(--color-text-tertiary)',border:'1px solid var(--color-border)',borderRadius:3,cursor:'pointer' }}>Deactivate</button>}
                    {client.status==='deactivated' && <button onClick={()=>updateClientStatus(client.id,'active')}      style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:500,padding:'5px 10px',background:'rgba(90,122,88,0.1)',color:'#5a7a58',border:'1px solid rgba(90,122,88,0.3)',borderRadius:3,cursor:'pointer' }}>Reactivate</button>}
                    <button onClick={()=>setConfirmDelete({type:'client',id:client.id,name:client.name})} style={{ fontFamily:'var(--font-body)',fontSize:11,fontWeight:500,padding:'5px 10px',background:'rgba(138,60,48,0.06)',color:'#8a3c30',border:'1px solid rgba(138,60,48,0.2)',borderRadius:3,cursor:'pointer' }}>Delete</button>
                  </div>
                  {/* Expand */}
                  <button onClick={()=>setExpandedClientId(isExp?null:client.id)} style={{ background:'none',border:'none',cursor:'pointer',color:'var(--color-text-tertiary)',fontSize:12,padding:4,transform:isExp?'rotate(180deg)':'none',transition:'transform 200ms' }}>▼</button>
                </div>

                {isExp && (
                  <div style={{ borderTop:'1px solid var(--color-border-subtle)',padding:'20px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:28,background:'rgba(248,244,238,0.5)' }}>
                    {/* Contact info */}
                    <div style={{ gridColumn:'1 / -1',paddingBottom:20,borderBottom:'1px solid var(--color-border-subtle)',marginBottom:4 }}>
                      {hd('Client Contact')}
                      <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12 }}>
                        {[['contactName','Contact Name','e.g. Sarah & Mike'],['contactEmail','Email','client@example.com']].map(([field,label,ph])=>(
                          <div key={field}>
                            <div style={{ fontFamily:'var(--font-body)',fontSize:10,color:'var(--color-text-tertiary)',marginBottom:4 }}>{label}</div>
                            <input
                              value={client[field]||''}
                              onChange={e=>onUpdateClients(prev=>prev.map(c=>c.id===client.id?{...c,[field]:e.target.value}:c))}
                              placeholder={ph}
                              style={{ width:'100%',boxSizing:'border-box',fontFamily:'var(--font-body)',fontSize:12.5,padding:'6px 10px',border:'1px solid var(--color-border)',borderRadius:3,background:'var(--color-white)',color:'var(--color-text-primary)',outline:'none' }}
                            />
                          </div>
                        ))}
                      </div>
                    </div>
                    {/* Data sources */}
                    <div>
                      {hd('Data Sources')}
                      <div style={{ display:'flex',flexWrap:'wrap',gap:6 }}>
                        {DATA_SOURCE_PRESETS.map(src => toggleBtn(src, client.dataSources.includes(src), () => toggleClientDataSource(client.id,src)))}
                      </div>
                      {client.dataSources.filter(s=>!DATA_SOURCE_PRESETS.includes(s)).map(src => (
                        <div key={src} style={{ display:'flex',alignItems:'center',gap:6,marginTop:6 }}>
                          {pill(src,'var(--color-gold)','rgba(201,168,76,0.1)')}
                          <button onClick={()=>toggleClientDataSource(client.id,src)} style={{ background:'none',border:'none',cursor:'pointer',color:'var(--color-text-tertiary)',fontSize:11 }}>✕</button>
                        </div>
                      ))}
                    </div>
                    {/* Staff assignment */}
                    <div>
                      {hd('Assigned Staff')}
                      <div style={{ display:'flex',flexDirection:'column',gap:8 }}>
                        {managedStaff.map(staff => (
                          <label key={staff.id} style={{ display:'flex',alignItems:'center',gap:10,cursor:'pointer' }}>
                            <input type="checkbox" checked={client.staffIds.includes(staff.id)} onChange={()=>toggleAssignment(staff.id,client.id)} style={{ accentColor:'var(--color-gold)',width:14,height:14 }} />
                            <span style={{ fontFamily:'var(--font-body)',fontSize:12.5,color:'var(--color-text-primary)' }}>{staff.name}</span>
                            <span style={{ fontFamily:'var(--font-body)',fontSize:10.5,color:'var(--color-text-tertiary)' }}>{staff.role}</span>
                          </label>
                        ))}
                      </div>
                      <div style={{ marginTop:12,fontFamily:'var(--font-body)',fontSize:10.5,color:'var(--color-text-tertiary)',fontStyle:'italic',lineHeight:1.5 }}>
                        Assigned staff can select this client from the dropdown and access their data and knowledge base.
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </>
    );
  }

  /* ─── STAFF TAB ─── */
  function StaffTab() {
    return (
      <>

              <div>

                <input value={newStaffName} onChange={e=>setNewStaffName(e.target.value)} placeholder="Full name" style={inputStyle} />

              <div>
                <label style={labelStyle}>Role</label>

            </div>
            <div style={{ marginBottom:24 }}>
              <label style={labelStyle}>Assign to Clients</label>
              <div style={{ display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(150px, 1fr))',gap:7 }}>

      {/* Confirm Delete */}
      {confirmDelete && (
        <div style={modalBg}>
          <div style={{ background:'var(--color-cream)',borderRadius:10,width:380,padding:32,boxShadow:'0 24px 60px rgba(0,0,0,0.18)' }}>
            <div style={{ fontFamily:'var(--font-display)',fontSize:20,fontWeight:400,color:'var(--color-text-primary)',marginBottom:10 }}>Delete {confirmDelete.type==='client'?'Client':'Staff'}</div>

          </div>
        </div>
      )}

  );
}

/* ── LOGIN ───────────────────────────────────────────────── */

function LoginPage({ onLogin }) {
  const [email, setEmail]       = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError]       = React.useState('');
  const [loading, setLoading]   = React.useState(false);
  const [forgotMode, setForgotMode]   = React.useState(false);
  const [forgotEmail, setForgotEmail] = React.useState('');
  const [forgotSent, setForgotSent]   = React.useState(false);

  function handleSubmit(e) {
    e.preventDefault();
    setError('');
    setLoading(true);
    setTimeout(() => {
      const match = USERS.find(u => u.email.toLowerCase() === email.trim().toLowerCase() && u.password === password);
      if (match) {
        localStorage.setItem('evgn_session', JSON.stringify({ email: match.email, name: match.name }));
        onLogin(match);
      } else {
        setError('Incorrect email or password.');
        setLoading(false);
      }
    }, 420);
  }

  function handleForgot(e) {
    e.preventDefault();
    setForgotSent(true);
  }

  const inputStyle = { width:'100%', boxSizing:'border-box', fontFamily:'var(--font-body)', fontSize:13, padding:'11px 14px', borderRadius:4, border:'1px solid var(--color-border)', background:'white', color:'var(--color-text-primary)', outline:'none', transition:'border-color 160ms ease' };

  return (
    <div style={{ minHeight:'100vh', background:'var(--color-cream)', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:24 }}>
      <div style={{ width:'100%', maxWidth:380 }}>

        {/* Logo */}
        <div style={{ textAlign:'center', marginBottom:40 }}>
          <div style={{ fontFamily:'var(--font-display)', fontSize:36, fontWeight:400, letterSpacing:'0.12em', color:'var(--color-brown-deep)' }}>evgn</div>
          <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'var(--color-text-tertiary)', marginTop:6, letterSpacing:'0.04em' }}>Intelligence OS</div>
        </div>

        {/* Card */}
        <div style={{ background:'white', border:'1px solid var(--color-border)', borderRadius:6, padding:'32px 32px 28px', boxShadow:'0 2px 16px rgba(44,24,16,0.06)' }}>

          {!forgotMode ? (
            <>
              <div style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:600, color:'var(--color-text-primary)', marginBottom:22 }}>Sign in to your workspace</div>
              <form onSubmit={handleSubmit}>
                <div style={{ marginBottom:14 }}>
                  <label style={{ display:'block', fontFamily:'var(--font-body)', fontSize:10.5, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--color-text-tertiary)', marginBottom:6 }}>Email</label>
                  <input type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" autoFocus required style={inputStyle} />
                </div>
                <div style={{ marginBottom:8 }}>
                  <label style={{ display:'block', fontFamily:'var(--font-body)', fontSize:10.5, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--color-text-tertiary)', marginBottom:6 }}>Password</label>
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required style={inputStyle} />
                </div>
                <div style={{ textAlign:'right', marginBottom:16 }}>
                  <button type="button" onClick={() => { setForgotMode(true); setForgotEmail(email); setError(''); }} style={{ fontFamily:'var(--font-body)', fontSize:11.5, color:'var(--color-text-tertiary)', background:'none', border:'none', cursor:'pointer', padding:0, textDecoration:'underline' }}>Forgot password?</button>
                </div>
                {error && (
                  <div style={{ fontFamily:'var(--font-body)', fontSize:12, color:'#8a4030', background:'rgba(180,100,80,0.07)', border:'1px solid rgba(180,100,80,0.2)', borderRadius:4, padding:'8px 12px', marginBottom:16 }}>{error}</div>
                )}
                <button type="submit" disabled={loading} style={{ width:'100%', fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, letterSpacing:'0.04em', padding:'12px 0', background: loading ? 'rgba(44,24,16,0.5)' : 'var(--color-brown-deep)', color:'var(--color-cream)', border:'none', borderRadius:4, cursor: loading ? 'default' : 'pointer', transition:'background 200ms ease' }}>
                  {loading ? 'Signing in…' : 'Sign In'}
                </button>
              </form>
            </>
          ) : forgotSent ? (
            <>
              <div style={{ textAlign:'center', marginBottom:16 }}>
                <div style={{ fontSize:32, marginBottom:12 }}>✉</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:600, color:'var(--color-text-primary)', marginBottom:10 }}>Check your email</div>
                <div style={{ fontFamily:'var(--font-body)', fontSize:13, color:'var(--color-text-secondary)', lineHeight:1.6 }}>
                  If an account exists for <strong>{forgotEmail}</strong>, a password reset link has been sent.
                </div>
              </div>
              <button onClick={() => { setForgotMode(false); setForgotSent(false); setForgotEmail(''); }} style={{ width:'100%', fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, padding:'12px 0', background:'var(--color-brown-deep)', color:'var(--color-cream)', border:'none', borderRadius:4, cursor:'pointer', marginTop:8 }}>
                Back to Sign In
              </button>
            </>
          ) : (
            <>
              <div style={{ fontFamily:'var(--font-body)', fontSize:15, fontWeight:600, color:'var(--color-text-primary)', marginBottom:6 }}>Reset your password</div>
              <div style={{ fontFamily:'var(--font-body)', fontSize:12.5, color:'var(--color-text-tertiary)', marginBottom:22, lineHeight:1.5 }}>Enter your email and we'll send you a reset link.</div>
              <form onSubmit={handleForgot}>
                <div style={{ marginBottom:20 }}>
                  <label style={{ display:'block', fontFamily:'var(--font-body)', fontSize:10.5, fontWeight:600, letterSpacing:'0.08em', textTransform:'uppercase', color:'var(--color-text-tertiary)', marginBottom:6 }}>Email</label>
                  <input type="email" value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} placeholder="you@example.com" autoFocus required style={inputStyle} />
                </div>
                <button type="submit" style={{ width:'100%', fontFamily:'var(--font-body)', fontSize:13, fontWeight:600, padding:'12px 0', background:'var(--color-brown-deep)', color:'var(--color-cream)', border:'none', borderRadius:4, cursor:'pointer', marginBottom:12 }}>
                  Send Reset Link
                </button>
                <button type="button" onClick={() => { setForgotMode(false); setForgotEmail(''); }} style={{ width:'100%', fontFamily:'var(--font-body)', fontSize:12.5, color:'var(--color-text-tertiary)', background:'none', border:'none', cursor:'pointer', padding:'6px 0' }}>
                  ← Back to Sign In
                </button>
              </form>
            </>
          )}
        </div>

        <div style={{ textAlign:'center', marginTop:20, fontFamily:'var(--font-body)', fontSize:11, color:'var(--color-text-tertiary)' }}>
          Evergreen New York · Internal use only
        </div>
      </div>
    </div>
  );
}

            ) : (
              <>
                <div style={{ fontFamily:'var(--font-body)',fontSize:9,fontWeight:600,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(248,244,238,0.3)',padding:'10px 24px 3px' }}>{section.label}</div>
                {section.children.map(child => (
                  <NavItem key={child.key} label={child.label} active={currentPath===child.path} phase={child.phase} onClick={() => child.phase!==2 && onNavigate(child.path)} indent />
                ))}
              </>
            )}
          </div>
        ))}
      </nav>

      <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)',paddingTop:4 }}>
        <button onClick={() => onNavigate('/admin')} style={{ display:'flex',alignItems:'center',width:'100%',padding:'9px 24px',fontFamily:'var(--font-body)',fontSize:12.5,fontWeight:400,letterSpacing:'0.02em',color:currentPath==='/admin'?'var(--color-cream)':'rgba(248,244,238,0.55)',textAlign:'left',background:currentPath==='/admin'?'rgba(248,244,238,0.07)':'none',border:'none',cursor:'pointer',position:'relative',minHeight:36,borderRadius:2,transition:'color 200ms ease, background 200ms ease' }}>
          {currentPath==='/admin' && <span style={{ position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',width:2,height:'60%',background:'var(--color-gold)',borderRadius:'0 2px 2px 0' }} />}
          <span style={{ marginRight:8,opacity:0.7 }}>⚙</span> Admin
        </button>
      </div>

      <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)' }}>
        <div style={{ display:'flex',alignItems:'center',gap:6,padding:'10px 22px 6px' }}>
          <span style={{ width:6,height:6,borderRadius:'50%',background:'var(--color-sage)',display:'inline-block',flexShrink:0 }} />
          <span style={{ fontFamily:'var(--font-body)',fontSize:10,fontWeight:500,letterSpacing:'0.08em',textTransform:'uppercase',color:'rgba(248,244,238,0.3)' }}>Phase 1</span>
        </div>
        {user && (
          <div style={{ padding:'8px 22px 14px' }}>
            <div style={{ fontFamily:'var(--font-body)',fontSize:11,color:'rgba(248,244,238,0.45)',marginBottom:6,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap' }}>{user.email}</div>
            <button onClick={onLogout} style={{ fontFamily:'var(--font-body)',fontSize:10.5,fontWeight:500,letterSpacing:'0.05em',color:'rgba(248,244,238,0.35)',background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:3,padding:'5px 10px',cursor:'pointer',transition:'all 150ms ease' }}>Sign out</button>
          </div>
        )}
      </div>
    </aside>
  );
}

function NavItem({ label, active, onClick, indent, phase }) {
  const isP2 = phase === 2;
  return (
    <button onClick={onClick} style={{ display:'flex',alignItems:'center',width:'100%',padding:indent?'8px 24px 8px 32px':'9px 24px',fontFamily:'var(--font-body)',fontSize:indent?11.5:12.5,fontWeight:400,letterSpacing:'0.02em',color:isP2?'rgba(248,244,238,0.25)':active?'var(--color-cream)':'rgba(248,244,238,0.55)',textAlign:'left',background:active?'rgba(248,244,238,0.07)':'none',border:'none',cursor:isP2?'default':'pointer',position:'relative',minHeight:36,borderRadius:2,transition:'color 200ms ease, background 200ms ease',opacity:isP2?0.5:1 }}>
      {active && <span style={{ position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',width:2,height:'60%',background:'var(--color-gold)',borderRadius:'0 2px 2px 0' }} />}
      <span style={{ flex:1 }}>{label}</span>
      {isP2 && <span style={{ fontSize:9,fontWeight:500,letterSpacing:'0.05em',textTransform:'uppercase',color:'rgba(248,244,238,0.3)',background:'rgba(255,255,255,0.06)',border:'1px solid rgba(255,255,255,0.1)',padding:'1px 5px',borderRadius:10,flexShrink:0 }}>Phase 2</span>}
    </button>
  );
}


/* ── APP ─────────────────────────────────────────────────── */

function App() {
  const [path, setPath] = React.useState('/');
  const [activeClient, setActiveClient] = React.useState('My Neighbors');
  const [highlight, setHighlight] = React.useState(null);
  const [monitors, setMonitors] = React.useState([]);
  const [managedClients, setManagedClients] = React.useState([
    { id:1, name:'My Neighbors',  contactName:'Sarah & Mike', contactEmail:'hello@myneighbors.co',   status:'active', dataSources:['Shopify'],                                                        staffIds:[1] },
    { id:2, name:'George Rings',  contactName:'George',       contactEmail:'george@georgerings.com', status:'active', dataSources:['Shopify','Google Analytics','Facebook Ads','Instagram Ads'],       staffIds:[1] },
    { id:3, name:'Foxiecakes',    contactName:'Foxie',        contactEmail:'hello@foxiecakes.com',   status:'active', dataSources:['Shopify','Google Analytics'],                                      staffIds:[1] },
  ]);
  const [managedStaff, setManagedStaff] = React.useState([
    { id:1, name:'Tori',    email:'jonestori784@gmail.com',       role:'Admin', clientIds:[1,2,3] },
    { id:2, name:'Lindsay', email:'lindsay@evergreennewyork.com', role:'Admin', clientIds:[1,2,3] },
    { id:3, name:'Megan',   email:'megan@evergreennewyork.com',   role:'Admin', clientIds:[1,2,3] },
  ]);
  const availableClients = managedClients.filter(c => c.status==='active' || c.status==='paused').map(c => c.name);

  // Auth — check localStorage for existing session
  const [user, setUser] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('evgn_session')); } catch { return null; }
  });

  function handleLogin(u) { setUser(u); }
  function handleLogout() {
    localStorage.removeItem('evgn_session');
    setUser(null);
  }

  if (!user) return <LoginPage onLogin={handleLogin} />;

  function renderPage() {
    switch (path) {
      case '/':                      return <HomePage activeClient={activeClient} onClientChange={setActiveClient} clients={availableClients} managedClients={managedClients} />;
      case '/intake/pipeline':       return <PipelinePage />;
      case '/intake/knowledge-base': return <KnowledgeBasePage />;
      case '/operations/all':        return <OpsAllPage clients={availableClients} />;
      case '/operations/client':     return <OpsClientPage teamMembers={managedStaff.map(s=>s.name)} />;
      case '/marketing/all':         return <MktAllPage clients={availableClients} />;
      case '/marketing/overview':    return <MktOverviewPage onNavigate={setPath} onClientChange={setActiveClient} onHighlight={setHighlight} monitors={monitors} onRemoveMonitor={id => setMonitors(m => m.filter(x => x.id !== id))} clients={availableClients} />;
      case '/marketing/client':      return <MktClientPage activeClient={activeClient} onClientChange={setActiveClient} highlight={highlight} onClearHighlight={() => setHighlight(null)} monitors={monitors} onSaveMonitor={m => setMonitors(prev => [...prev, m])} clients={availableClients} />;
      case '/finance/overview':       return <FinOverviewPage onNavigate={setPath} onClientChange={setActiveClient} clients={availableClients} />;
      case '/finance/client':        return <FinancePage activeClient={activeClient} onClientChange={setActiveClient} clients={availableClients} />;
      case '/admin':                 return <AdminPage managedClients={managedClients} managedStaff={managedStaff} onUpdateClients={setManagedClients} onUpdateStaff={setManagedStaff} user={user} />;
      default:                       return <HomePage activeClient={activeClient} onClientChange={setActiveClient} clients={availableClients} />;
    }
  }

  return (
    <div style={{ display:'flex',height:'100vh',overflow:'hidden',background:'var(--color-cream)' }}>
      <Sidebar currentPath={path} onNavigate={setPath} user={user} onLogout={handleLogout} />
      <main key={path + activeClient} style={{ flex:1,overflowY:'auto',display:'flex',flexDirection:'column' }}>
        {renderPage()}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
